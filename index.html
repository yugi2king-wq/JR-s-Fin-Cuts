<!DOCTYPE html>
<html>
<head>
  <title>JR’s Fin Cuts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body class="home-page">

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img src="images/logo.jpg" class="logo">
    <div class="title-box">
      <h1>JR’s Fin Cuts</h1>
      <p class="tagline">Fresh Seafood</p>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="banner">
    📅 Next-day delivery available
  </div>

  <h2 class="section-title">Today’s Fresh Picks</h2>

  <div class="container">

    <!-- Murrel -->
    <div class="card"
      data-name="Murrel"
      data-local="Korameenu"
      data-price="600"
      data-img="images/products/koramennu.png">

      <a href="product.html?id=murrel">
        <img src="images/products/koramennu.png" class="single-img">
      </a>

      <div class="top-row">
        <h3>Murrel</h3>
        <p class="price">₹600 (1kg)</p>
      </div>

      <p class="local">Korameenu</p>
      <p class="desc">Fresh and hygienic seafood</p>

      <div class="action-area">
        <div class="qty">
          <button class="minus">-</button>
          <input type="number" value="0.5" min="0.5" step="0.5">
          <button class="plus">+</button>
        </div>

        <button class="add-btn btn">Add to Cart</button>
      </div>

    </div>

    <!-- Tilapia -->
    <div class="card"
      data-name="Tilapia"
      data-local="Pilot Fish"
      data-price="400"
      data-img="images/products/tilapia.png">

      <a href="product.html?id=tilapia">
        <img src="images/products/tilapia.png" class="single-img">
      </a>

      <div class="top-row">
        <h3>Tilapia</h3>
        <p class="price">₹400 (1kg)</p>
      </div>

      <p class="local">Pilot Fish</p>
      <p class="desc">Cleaned and ready to cook</p>

      <div class="action-area">
        <div class="qty">
          <button class="minus">-</button>
          <input type="number" value="0.5" min="0.5" step="0.5">
          <button class="plus">+</button>
        </div>

        <button class="add-btn btn">Add to Cart</button>
      </div>

    </div>

    <!-- Prawns -->
    <div class="card"
      data-name="Prawns"
      data-local="Royyalu"
      data-price="600"
      data-img="images/products/prawns.png">

      <a href="product.html?id=prawns">
        <img src="images/products/prawns.png" class="single-img">
      </a>

      <div class="top-row">
        <h3>Prawns</h3>
        <p class="price">₹600 (500g)</p>
      </div>

      <p class="local">Royyalu</p>
      <p class="desc">Premium quality seafood</p>

      <div class="action-area">
        <div class="qty">
          <button class="minus">-</button>
          <input type="number" value="0.5" min="0.5" step="0.5">
          <button class="plus">+</button>
        </div>

        <button class="add-btn btn">Add to Cart</button>
      </div>

    </div>

  </div>

</div>

<!-- NAVBAR -->
<div class="bottom-nav">
  <a href="index.html" class="active">
    <span class="material-icons">home</span><br>Home
  </a>

  <a href="cart.html">
    <span class="material-icons">shopping_cart</span>
    <span id="cart-count" class="badge"></span>
    <br>Cart
  </a>

  <a href="info.html">
    <span class="material-icons">info</span><br>Info
  </a>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
