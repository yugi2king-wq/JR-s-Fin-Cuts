<!DOCTYPE html>
<html>
<head>
  <title>Product - Fresh Fish Nellore | Tilapia, Korameenu & Prawns Delivery | JR's Fin Cuts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="product-page">

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img src="images/logo.png" class="logo">
    <div class="title-box">
      <h1>JR’s Fin Cuts</h1>
      <p class="tagline">Fresh Seafood</p>
    </div>
  </div>
</div>

<div class="content">

  <!-- BACK -->
  <button onclick="goBack()" class="back-btn">← Back</button>

  <!-- PRODUCT NAME -->
  <h2 id="product-name"></h2>

  <!-- IMAGE SLIDER -->
  <div class="product-slider">
    <img id="img1" class="slide">
    <img id="img2" class="slide">
  </div>

  <!-- DOTS -->
  <div class="dots" id="dots">
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

  <!-- DETAILS -->
  <div class="product-info">
    <p id="local-name" class="local"></p>
    <p id="price" class="price"></p>
    <p id="desc" class="desc"></p>
  </div>

  <!-- QTY -->
  <div class="qty">
    <button onclick="changeQty(-0.5)">-</button>
    <input type="number" id="qty" value="0.5" min="0.5" step="0.5">
    <button onclick="changeQty(0.5)">+</button>
  </div>

  <!-- ADD -->
  <button class="add-btn" onclick="addProduct()">Add to Cart</button>

  <!-- MORE PRODUCTS -->
  <h3 class="section-subtitle">More Products</h3>
  <div class="more-products" id="more-products"></div>

</div>

<!-- NAVBAR -->
<div class="bottom-nav">
  <a href="index.html">
    <span class="material-icons">home</span><br>Home
  </a>

  <a href="cart.html">
    <span class="material-icons">shopping_cart</span>
    <span id="cart-count" class="badge"></span>
    <br>Cart
  </a>

  <a href="info.html">
    <span class="material-icons">info</span><br>Info
  </a>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
